server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- Redirects ---
  location = /how-it-works-privacy {
    return 301 /how-it-works;
  }

  # --- Static content ---
  location / {
    # Try exact file, then about.html, then about/index.html — no redirect needed
    try_files $uri $uri.html $uri/index.html =404;
  }

  error_page 404 /404.html;
}
